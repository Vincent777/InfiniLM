name: Cleanup CI Docker Images

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      keep_count:
        description: Number of newest images to keep per prefix
        required: false
        default: "5"
        type: string
      dry_run:
        description: Dry run only (list without deleting)
        required: false
        default: false
        type: boolean
      platform:
        description: Platform to clean
        required: false
        default: all
        type: choice
        options:
          - all
          - nvidia
          - metax
          - moore
          - cambricon
          - iluvatar
          - ascend

jobs:
  cleanup:
    name: cleanup (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON((github.event_name == 'workflow_dispatch' && github.event.inputs.platform != 'all') && format('["{0}"]', github.event.inputs.platform) || '["nvidia","metax","moore","cambricon","iluvatar","ascend"]') }}
    runs-on:
      - self-hosted
      - linux
      - ${{ matrix.platform }}
      - InfiniLM
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup old CI Docker images
        env:
          KEEP_COUNT: ${{ github.event.inputs.keep_count || '5' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          args=(--platform "${{ matrix.platform }}" --count "${KEEP_COUNT}")
          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi
          bash scripts/cleanup_ci_images.sh "${args[@]}"
